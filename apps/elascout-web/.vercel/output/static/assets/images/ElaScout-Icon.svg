<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E59B"/>
      <stop offset="100%" style="stop-color:#00B87A"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#00E59B"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="40" fill="#0B0E14"/>

  <g transform="translate(100, 100)">
    <!-- Radar rings -->
    <circle cx="0" cy="0" r="82" fill="none" stroke="#00E59B" stroke-width="3" opacity="0.15"/>
    <circle cx="0" cy="0" r="60" fill="none" stroke="#00E59B" stroke-width="2.5" opacity="0.3"/>
    <circle cx="0" cy="0" r="38" fill="none" stroke="#00E59B" stroke-width="2" opacity="0.5"/>

    <!-- Sweep -->
    <path d="M0,0 L-12,-78 A82,82 0 0,1 52,-63 Z" fill="url(#accentGrad)" opacity="0.25"/>

    <!-- Pentagon -->
    <polygon points="0,-50 48,-15 30,40 -30,40 -48,-15" fill="none" stroke="#00E59B" stroke-width="3" stroke-linejoin="round"/>
    <polygon points="0,-34 32,-10 20,27 -20,27 -32,-10" fill="url(#brandGrad)" opacity="0.15"/>

    <!-- Axes -->
    <line x1="0" y1="0" x2="0" y2="-50" stroke="#00E59B" stroke-width="1.5" opacity="0.3"/>
    <line x1="0" y1="0" x2="48" y2="-15" stroke="#00E59B" stroke-width="1.5" opacity="0.3"/>
    <line x1="0" y1="0" x2="30" y2="40" stroke="#00E59B" stroke-width="1.5" opacity="0.3"/>
    <line x1="0" y1="0" x2="-30" y2="40" stroke="#00E59B" stroke-width="1.5" opacity="0.3"/>
    <line x1="0" y1="0" x2="-48" y2="-15" stroke="#00E59B" stroke-width="1.5" opacity="0.3"/>

    <!-- Center -->
    <circle cx="0" cy="0" r="6" fill="#00E59B"/>

    <!-- Data points -->
    <circle cx="0" cy="-34" r="4.5" fill="#00E59B"/>
    <circle cx="32" cy="-10" r="4.5" fill="#00E59B"/>
    <circle cx="20" cy="27" r="4.5" fill="#3B82F6"/>
    <circle cx="-20" cy="27" r="4.5" fill="#3B82F6"/>
    <circle cx="-32" cy="-10" r="4.5" fill="#00E59B"/>

    <!-- Athlete silhouette -->
    <circle cx="0" cy="-10" r="5.5" fill="#F1F5F9"/>
    <path d="M0,-4 L0,10 M-7,3 L0,-1.5 L7,3 M-6,18 L0,10 L6,18" stroke="#F1F5F9" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  </g>
</svg>
