<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <!-- Gradient for the icon -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E59B"/>
      <stop offset="100%" style="stop-color:#00B87A"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#00E59B"/>
    </linearGradient>
    <!-- Subtle shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00E59B" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- ===== ICON: Radar/Scout symbol ===== -->
  <g transform="translate(100, 200)">
    <!-- Outer radar ring -->
    <circle cx="0" cy="0" r="72" fill="none" stroke="url(#brandGrad)" stroke-width="4" opacity="0.3"/>
    <!-- Middle radar ring -->
    <circle cx="0" cy="0" r="50" fill="none" stroke="url(#brandGrad)" stroke-width="3" opacity="0.5"/>
    <!-- Inner radar ring -->
    <circle cx="0" cy="0" r="28" fill="none" stroke="url(#brandGrad)" stroke-width="2.5" opacity="0.7"/>

    <!-- Radar sweep / scout beam -->
    <path d="M0,0 L-10,-70 A72,72 0 0,1 45,-55 Z" fill="url(#accentGrad)" opacity="0.35"/>

    <!-- Pentagon shape (performance radar) -->
    <polygon points="0,-38 36,-12 22,31 -22,31 -36,-12" fill="none" stroke="#00E59B" stroke-width="2.5" stroke-linejoin="round"/>

    <!-- Inner performance shape (filled) -->
    <polygon points="0,-26 24,-8 15,21 -15,21 -24,-8" fill="url(#brandGrad)" opacity="0.2"/>

    <!-- Center dot -->
    <circle cx="0" cy="0" r="5" fill="#00E59B"/>

    <!-- Performance axes -->
    <line x1="0" y1="0" x2="0" y2="-38" stroke="#00E59B" stroke-width="1.2" opacity="0.4"/>
    <line x1="0" y1="0" x2="36" y2="-12" stroke="#00E59B" stroke-width="1.2" opacity="0.4"/>
    <line x1="0" y1="0" x2="22" y2="31" stroke="#00E59B" stroke-width="1.2" opacity="0.4"/>
    <line x1="0" y1="0" x2="-22" y2="31" stroke="#00E59B" stroke-width="1.2" opacity="0.4"/>
    <line x1="0" y1="0" x2="-36" y2="-12" stroke="#00E59B" stroke-width="1.2" opacity="0.4"/>

    <!-- Data points on the pentagon -->
    <circle cx="0" cy="-26" r="3.5" fill="#00E59B"/>
    <circle cx="24" cy="-8" r="3.5" fill="#00E59B"/>
    <circle cx="15" cy="21" r="3.5" fill="#3B82F6"/>
    <circle cx="-15" cy="21" r="3.5" fill="#3B82F6"/>
    <circle cx="-24" cy="-8" r="3.5" fill="#00E59B"/>

    <!-- Small athlete silhouette in center -->
    <!-- Head -->
    <circle cx="0" cy="-8" r="4.5" fill="#0B0E14"/>
    <!-- Body -->
    <path d="M0,-3.5 L0,8 M-6,2 L0,-1 L6,2 M-5,14 L0,8 L5,14" stroke="#0B0E14" stroke-width="2" stroke-linecap="round" fill="none"/>
  </g>

  <!-- ===== WORDMARK ===== -->
  <g transform="translate(200, 170)">
    <!-- "Ela" in dark -->
    <text x="0" y="55" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="-2" fill="#0B0E14">Ela</text>
    <!-- "Scout" in brand green -->
    <text x="142" y="55" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="-2" fill="#00E59B">Scout</text>
  </g>

  <!-- Tagline -->
  <text x="200" y="260" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="500" letter-spacing="5" fill="#8892A4" text-transform="uppercase">ATHLETE INTELLIGENCE PLATFORM</text>

  <!-- Subtle accent line -->
  <rect x="200" y="232" width="60" height="3" rx="1.5" fill="url(#brandGrad)"/>
</svg>
