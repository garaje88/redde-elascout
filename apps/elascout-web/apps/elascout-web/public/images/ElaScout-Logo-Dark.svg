<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E59B"/>
      <stop offset="100%" style="stop-color:#00B87A"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#00E59B"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="800" height="400" rx="16" fill="#0B0E14"/>

  <!-- ===== ICON ===== -->
  <g transform="translate(100, 200)">
    <circle cx="0" cy="0" r="72" fill="none" stroke="#00E59B" stroke-width="4" opacity="0.2"/>
    <circle cx="0" cy="0" r="50" fill="none" stroke="#00E59B" stroke-width="3" opacity="0.35"/>
    <circle cx="0" cy="0" r="28" fill="none" stroke="#00E59B" stroke-width="2.5" opacity="0.55"/>
    <path d="M0,0 L-10,-70 A72,72 0 0,1 45,-55 Z" fill="url(#accentGrad)" opacity="0.3"/>
    <polygon points="0,-38 36,-12 22,31 -22,31 -36,-12" fill="none" stroke="#00E59B" stroke-width="2.5" stroke-linejoin="round"/>
    <polygon points="0,-26 24,-8 15,21 -15,21 -24,-8" fill="url(#brandGrad)" opacity="0.15"/>
    <circle cx="0" cy="0" r="5" fill="#00E59B"/>
    <line x1="0" y1="0" x2="0" y2="-38" stroke="#00E59B" stroke-width="1.2" opacity="0.3"/>
    <line x1="0" y1="0" x2="36" y2="-12" stroke="#00E59B" stroke-width="1.2" opacity="0.3"/>
    <line x1="0" y1="0" x2="22" y2="31" stroke="#00E59B" stroke-width="1.2" opacity="0.3"/>
    <line x1="0" y1="0" x2="-22" y2="31" stroke="#00E59B" stroke-width="1.2" opacity="0.3"/>
    <line x1="0" y1="0" x2="-36" y2="-12" stroke="#00E59B" stroke-width="1.2" opacity="0.3"/>
    <circle cx="0" cy="-26" r="3.5" fill="#00E59B"/>
    <circle cx="24" cy="-8" r="3.5" fill="#00E59B"/>
    <circle cx="15" cy="21" r="3.5" fill="#3B82F6"/>
    <circle cx="-15" cy="21" r="3.5" fill="#3B82F6"/>
    <circle cx="-24" cy="-8" r="3.5" fill="#00E59B"/>
    <circle cx="0" cy="-8" r="4.5" fill="#F1F5F9"/>
    <path d="M0,-3.5 L0,8 M-6,2 L0,-1 L6,2 M-5,14 L0,8 L5,14" stroke="#F1F5F9" stroke-width="2" stroke-linecap="round" fill="none"/>
  </g>

  <!-- ===== WORDMARK ===== -->
  <g transform="translate(200, 170)">
    <text x="0" y="55" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="-2" fill="#F1F5F9">Ela</text>
    <text x="142" y="55" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="-2" fill="#00E59B">Scout</text>
  </g>

  <text x="200" y="260" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="500" letter-spacing="5" fill="#5A6578">ATHLETE INTELLIGENCE PLATFORM</text>
  <rect x="200" y="232" width="60" height="3" rx="1.5" fill="url(#brandGrad)"/>
</svg>
