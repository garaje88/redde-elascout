name = "elascout-api"
main = "src/worker.ts"
compatibility_date = "2024-09-23"

# Enable Node.js built-in APIs (needed for crypto polyfills, etc.)
compatibility_flags = ["nodejs_compat"]

# ─── Local development ────────────────────────────────────────────────────────
# Run locally with: npx wrangler dev
# Environment variables for local dev (non-sensitive) — secrets must be set via:
#   npx wrangler secret put FIREBASE_CLIENT_EMAIL
#   npx wrangler secret put FIREBASE_PRIVATE_KEY
#   npx wrangler secret put FIREBASE_PROJECT_ID
#   npx wrangler secret put GOOGLE_CLIENT_ID

[vars]
CORS_ORIGIN = "http://localhost:3000"

# ─── Production environment ───────────────────────────────────────────────────
[env.production]
name = "elascout-api"

[env.production.vars]
CORS_ORIGIN = "https://elascout.pages.dev"
# Set the following secrets in the Cloudflare dashboard or via wrangler:
#   wrangler secret put FIREBASE_PROJECT_ID --env production
#   wrangler secret put FIREBASE_CLIENT_EMAIL --env production
#   wrangler secret put FIREBASE_PRIVATE_KEY --env production
#   wrangler secret put GOOGLE_CLIENT_ID --env production
#
# IMPORTANT: FIREBASE_PRIVATE_KEY must be entered with literal \n
# (the wrangler CLI will preserve them — do NOT replace with actual newlines).
